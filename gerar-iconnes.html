<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cysy Fertilizantes - Ícones Embutidos</title>
<style>
body{font-family:system-ui;padding:20px;background:#f0f0f0}
.icon-grid{display:flex;flex-wrap:wrap;gap:20px;justify-content:center;margin-top:20px}
.icon-grid img{border:2px solid #ddd;border-radius:12px;padding:10px;background:#fff}
</style>
</head>
<body>
<h1>📱 Ícones PWA - Cysy Fertilizantes</h1>
<p>Copie os dados Base64 abaixo e salve como arquivos PNG na pasta <strong>icons/</strong>, ou use diretamente no código.</p>

<h2>192x192 (icon-192.png)</h2>
<textarea id="out192" style="width:100%;height:80px;font-family:monospace;font-size:11px;"></textarea>

<h2>512x512 (icon-512.png)</h2>
<textarea id="out512" style="width:100%;height:80px;font-family:monospace;font-size:11px;"></textarea>

<h2>180x180 (apple-touch-icon.png)</h2>
<textarea id="out180" style="width:100%;height:80px;font-family:monospace;font-size:11px;"></textarea>

<h2>96x96 (favicon-96x96.png)</h2>
<textarea id="out96" style="width:100%;height:80px;font-family:monospace;font-size:11px;"></textarea>

<script>
const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E40AF"/><stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
    <linearGradient id="leaf1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6EE7B7"/><stop offset="50%" stop-color="#10B981"/><stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <filter id="drop"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#047857" flood-opacity="0.4"/></filter>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <ellipse cx="256" cy="440" rx="90" ry="16" fill="#000" opacity="0.18"/>
  <path d="M256 430 C256 430 240 360 210 300" stroke="#065F46" stroke-width="18" stroke-linecap="round" fill="none"/>
  <path d="M210 300 C150 210 120 80 256 60 C392 80 362 215 256 280 C240 295 210 300 210 300Z" fill="url(#leaf1)" filter="url(#drop)"/>
  <path d="M256 340 C310 295 385 285 390 230 C330 225 258 272 256 340Z" fill="#10B981"/>
</svg>`;

const img = new Image();
img.src = 'data:image/svg+xml;base64,' + btoa(svg);
img.onload = () => {
  [192, 512, 180, 96].forEach(size => {
    const c = document.createElement('canvas');
    c.width = c.height = size;
    const ctx = c.getContext('2d');
    const r = size * 0.19;
    ctx.beginPath();
    ctx.roundRect ? ctx.roundRect(0,0,size,size,r) : ctx.rect(0,0,size,size);
    ctx.clip();
    ctx.drawImage(img, 0, 0, size, size);
    const base64 = c.toDataURL('image/png').split(',')[1];
    document.getElementById('out' + size).value = base64;
  });
  document.body.innerHTML += '<p style="color:green;font-weight:bold">✅ Ícones gerados! Copie cada Base64 e salve como PNG.</p>';
};
</script>
</body>
</html>
